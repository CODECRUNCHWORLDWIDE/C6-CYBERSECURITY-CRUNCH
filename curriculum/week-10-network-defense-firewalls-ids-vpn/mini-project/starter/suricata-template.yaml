# suricata.yaml — TEMPLATE FRAGMENT
#
# AUTHORIZED USE ONLY.  Deploy Suricata only on a network you own and
# administer or for which you hold written authorisation.
#
# This file is a *fragment*.  Merge it into your installed
# /etc/suricata/suricata.yaml; do not replace the whole shipped file.
#
# Reference: https://docs.suricata.io/

vars:
  address-groups:
    HOME_NET: "[10.0.10.0/24,10.0.20.0/24,10.0.30.0/24,10.0.40.0/24,10.10.0.0/24]"
    EXTERNAL_NET: "!$HOME_NET"
    HTTP_SERVERS: "$HOME_NET"
    SMTP_SERVERS: "$HOME_NET"
    SQL_SERVERS:  "$HOME_NET"
    DNS_SERVERS:  "$HOME_NET"
    TELNET_SERVERS: "$HOME_NET"
    DC_SERVERS:     "$HOME_NET"
    DNP3_SERVER:    "$HOME_NET"
    DNP3_CLIENT:    "$HOME_NET"
    MODBUS_CLIENT:  "$HOME_NET"
    MODBUS_SERVER:  "$HOME_NET"
    ENIP_CLIENT:    "$HOME_NET"
    ENIP_SERVER:    "$HOME_NET"

  port-groups:
    HTTP_PORTS:     "80,8080,8000,8443"
    SHELLCODE_PORTS: "!80"
    SSH_PORTS:       22
    FILE_DATA_PORTS: "[$HTTP_PORTS,110,143]"
    FTP_PORTS:       21

# TODO: edit this interface name to whichever NIC sees the traffic.
af-packet:
  - interface: eth0
    threads: 2
    cluster-id: 99
    cluster-type: cluster_flow
    defrag: yes
    use-mmap: yes
    tpacket-v3: yes
    ring-size: 200000
    block-size: 32768
    checksum-checks: kernel

outputs:
  - fast:
      enabled: no
  - eve-log:
      enabled: yes
      filetype: regular
      filename: /var/log/suricata/eve.json
      community-id: yes
      community-id-seed: 0
      types:
        - alert:
            metadata: yes
        - http:
            extended: yes
        - dns:
            query: yes
            answer: yes
        - tls:
            extended: yes
        - flow

default-rule-path: /var/lib/suricata/rules
rule-files:
  - suricata.rules
  - /etc/suricata/rules/local.rules

threshold-file: /etc/suricata/threshold.config

