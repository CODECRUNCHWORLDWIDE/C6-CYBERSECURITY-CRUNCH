# wg0-client-template.conf — WireGuard client configuration TEMPLATE
#
# AUTHORIZED USE ONLY.  This client config admits a device to a network
# the operator owns or is authorised to administer.  Never commit a real
# PrivateKey to git.
#
# Reference: Donenfeld 2017 — https://www.wireguard.com/papers/wireguard.pdf

[Interface]
# TODO: replace with the client's real private key.  Do NOT commit this.
# Generate with exercise-05-wireguard-keygen.py.
PrivateKey = PLACEHOLDER_PRIVATE_KEY_FOR_SUBMISSION

# This client's address inside the VPN overlay.  Must be in the server's
# overlay subnet (10.10.0.0/24 in the reference architecture).
Address = 10.10.0.2/32

# Use the VPN-side resolver for DNS so internal hostnames work and
# so DNS queries do not leak outside the tunnel.
DNS = 10.10.0.1

[Peer]
# The server's public key.  Public; safe to commit.
# TODO: replace with the actual server public key.
PublicKey = PLACEHOLDER_SERVER_PUBLIC_KEY

# Optional pre-shared key, matching what the server's [Peer] block has.
# PresharedKey = PLACEHOLDER_PSK_FOR_SUBMISSION

# The server's public endpoint.  Hostname is resolved at every
# `wg-quick up`; the protocol roams between IPs after the connection
# is up.
# TODO: replace with your real server host:port.
Endpoint = vpn.example.com:51820

# Routing.  Pick ONE of:
#
# Full-tunnel — every packet through the VPN.  Use on untrusted networks
# (coffee shop, hotel, public Wi-Fi).
#   AllowedIPs = 0.0.0.0/0, ::/0
#
# Split-tunnel — only the overlay + the internal LAN through the VPN;
# the rest direct.  Use when the local network is trusted.
#   AllowedIPs = 10.10.0.0/24, 10.0.10.0/24
AllowedIPs = 10.10.0.0/24, 10.0.10.0/24

# Keep the NAT mapping alive on the client's side of any NAT gateway.
# Costs about 1 KB/minute in keep-alive traffic.
PersistentKeepalive = 25
