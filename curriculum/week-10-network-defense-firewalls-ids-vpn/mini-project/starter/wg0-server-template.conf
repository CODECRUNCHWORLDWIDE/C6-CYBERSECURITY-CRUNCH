# wg0-server-template.conf — WireGuard server configuration TEMPLATE
#
# AUTHORIZED USE ONLY.  Deploy on a network you own or are authorised
# to administer.  Never commit a real PrivateKey to git.
#
# Reference: Donenfeld 2017 — https://www.wireguard.com/papers/wireguard.pdf
#            wg(8), wg-quick(8) man pages

[Interface]
# TODO: replace with the server's real private key.  Do NOT commit this.
# Generate with:  wg genkey | tee server.private | wg pubkey > server.public
PrivateKey = PLACEHOLDER_PRIVATE_KEY_FOR_SUBMISSION

# The server's own address inside the VPN overlay.
Address = 10.10.0.1/24

# The UDP port the server listens on.
ListenPort = 51820

# Optional: run nftables side-effects when the interface comes up / goes down.
# Keep them minimal; complex firewall rules belong in the main ruleset, not here.
PostUp   = echo "wg0 up at $(date -Is)" | systemd-cat -t wireguard
PostDown = echo "wg0 down at $(date -Is)" | systemd-cat -t wireguard

# --------------------------------------------------------------------
# Peers.  One [Peer] block per authorised device.  Add or remove peers
# by editing this file and running:
#     sudo wg syncconf wg0 <(wg-quick strip wg0)
# for atomic application without disrupting other tunnels.
# --------------------------------------------------------------------

# Peer: laptop-alice
# Added: TODO
# Authorisation: TODO (engagement letter, employer authorisation, self-owned, etc.)
[Peer]
PublicKey = PLACEHOLDER_PUBLIC_KEY_ALICE_LAPTOP
AllowedIPs = 10.10.0.2/32
# Optional pre-shared key for defence-in-depth against future quantum attacks:
# PresharedKey = PLACEHOLDER_PSK_ALICE
# Optional keepalive on the server side is rare; configure on the client.

# Peer: phone-alice
# Added: TODO
[Peer]
PublicKey = PLACEHOLDER_PUBLIC_KEY_ALICE_PHONE
AllowedIPs = 10.10.0.3/32

